<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
	<title>[[${pageTitle}]]</title>
	
	<!-- 1. CSS (Bootstrap gikan sa WebJars) -->
	<link rel="stylesheet" type="text/css" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" />
	<link rel="stylesheet" type="text/css" th:href="@{/webjars/font-awesome/css/all.min.css}" />
	
    <!-- 3. JQUERY (Kani ang ni-work na!) -->
	<script type="text/javascript" th:src="@{/webjars/jquery/jquery.min.js}"></script>
	<script type="text/javascript" th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
</head>
<body>
	<div class="container-fluid px-3">
		<!-- Navigation Menu -->
		<div th:replace="~{navigation :: menu}"></div>
        
        <div class="text-center mt-3 mb-3">
            <h2>Your Account Details</h2>
        </div>
        
        <!-- "The user has been saved successfully" -->
        <!-- <div th:if="${message != null}" class="alert alert-success text-center mt-3">[[${message}]]</div> -->
        
        <!-- Form Section -->
        <div class="card shadow-sm mx-auto" style="max-width: 700px;">
            <div class="card-body p-4">
                <form th:action="@{/account/update}" method="post" th:object="${user}"
                    style="max-width: 600px; margin: 0 auto;" enctype="multipart/form-data">
                    <input type="hidden" th:field="*{id}" />
                    <div class="mb-3 row">
                        <label class="col-sm-4 col-form-label text-sm-end">E-mail:</label>
                        <div class="col-sm-8">
                            <input type="email" class="form-control" th:field="*{email}" readonly="readonly" />
                        </div>
                    </div>

                    <div class="mb-3 row">
                        <label class="col-sm-4 col-form-label text-sm-end">First Name:</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" th:field="*{firstName}" required th:minlength="2"
                                th:maxlength="45" />
                        </div>
                    </div>

                    <div class="mb-3 row">
                        <label class="col-sm-4 col-form-label text-sm-end">Last Name:</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" th:field="*{lastName}" required th:minlength="2"
                                th:maxlength="45" />
                        </div>
                    </div>

                    <div class="mb-3 row">
                        <label class="col-sm-4 col-form-label text-sm-end">Password:</label>
                        <div class="col-sm-8">

                            <!-- Kon ang ID kay NULL (New), 'required'. Kon naay ID (Edit), dili na 'required' -->
                            <input th:if="${user.id == null}" type="password" class="form-control"
                                th:field="*{password}" required th:minlength="8" th:maxlength="20" />

                            <!-- Kon EDIT USER (naay id), DILI REQUIRED ug naay placeholder -->
                            <input th:if="${user.id != null}" type="password" class="form-control"
                                th:field="*{password}" th:minlength="8" th:maxlength="20"
                                oninput="checkPasswordMatch(document.getElementById('confirmPassword'))"
                                placeholder="Leave blank if you don't want to change password" />
                        </div>
                    </div>
                    
                    <div class="mb-3 row">
                        <label class="col-sm-4 col-form-label text-sm-end">Confirm Password:</label>
                        <div class="col-sm-8">
                            <input type="password" id="confirmPassword" class="form-control"
                                th:minlength="8" th:maxlength="20" oninput="checkPasswordMatch(this)" />
                        </div>
                    </div>

                    <div class="mb-3 row">
                        <label class="col-sm-4 col-form-label text-sm-end">Assigned Roles:</label>
                        <div class="col-sm-8 pt-2">
                            <span><b>[[${user.roles}]]</b></span>
                        </div>
                    </div>

                    <!-- <div class="mb-3 row">
                        <label class="col-sm-4 col-form-label text-sm-end">Enabled:</label>
                        <div class="col-sm-8 pt-2">
                            <input type="checkbox" class="form-check-input" th:field="*{enabled}" />
                        </div>
                    </div> -->

                    <div class="mb-3 row">
                        <label class="col-sm-4 col-form-label text-sm-end">Photos:</label>
                        <div class="col-sm-8">
                            <!-- Hidden field para dili mawala ang karaan nga photo name kon mag-edit -->
                            <input type="hidden" th:field="*{photos}" /> 
                            <input type="file" id="fileImage" name="image" accept="image/png, image/jpeg" class="mb-2" />

                            <div>
                                <img id="thumbnail" alt="Photos preview" th:src="@{${user.photosImagePath}}"
                                    class="img-fluid border rounded"
                                    style="width: 100px; height: 100px; object-fit: cover;" />
                            </div>
                        </div>
                    </div>

                    <div class="text-center mt-4">
                        <input type="submit" value="Save" class="btn btn-primary me-2" /> 
                        <input type="button" value="Cancel" class="btn btn-secondary" id="buttonCancel" />
                    </div>
                </form>

                <!-- Modal Dialog -->
                <div th:replace="~{fragments :: modal_dialog}"></div>
            </div>
        </div>

        <div th:replace="~{fragments :: footer}"></div>
	</div>

	<script type="text/javascript">
    $(document).ready(function() {
        $("#buttonCancel").on("click", function() {
            window.location = "[[@{/users}]]";
        });
        
        // I-check kung naa message gikan sa RedirectAttributes
        var message = "[[${message}]]";
        if (message != "") {
        	showModalDialog("Success", message);
        }
    });
    
 	// Kani nga variable basahon sa script.js
    var checkEmailUrl = "[[@{/users/check_email}]]";
    var moduleURL = "[[@{/users}]]";
</script>
<script type="text/javascript" th:src="@{/js/script.js}"></script>
</body>
</html>
