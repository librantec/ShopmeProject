<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <title>Manage Brand - Shopme Admin</title>
        
    <link rel="stylesheet" type="text/css" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" />
    <link rel="stylesheet" type="text/css" th:href="@{/webjars/font-awesome/css/all.min.css}" />
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}" />
    <script type="text/javascript" th:src="@{/webjars/jquery/jquery.min.js}"></script>
    
    <!-- 1. LOCAL DATATABLES CSS (Dili na ma-block!) -->
    <link rel="stylesheet" type="text/css" th:href="@{/webjars/datatables/css/jquery.dataTables.min.css}" />
    <link rel="stylesheet" type="text/css" th:href="@{/webjars/datatables-responsive/css/responsive.dataTables.min.css}" />
    
    <!-- 2. LOCAL DATATABLES JS -->
    <script type="text/javascript" th:src="@{/webjars/datatables/js/jquery.dataTables.min.js}"></script>
    <script type="text/javascript" th:src="@{/webjars/datatables-responsive/js/dataTables.responsive.min.js}"></script>
    <!-- <script type="text/javascript" th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script> -->
    <script type="text/javascript" th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
    
</head>
<body>
    <div class="container-fluid px-3">
        <!-- Navigation Menu -->
        <div th:replace="~{navigation :: menu}"></div>

        <div class="mt-3 mb-3">
            <div class="row align-items-center">
                <!-- 1. Ang Title sa wala -->
                <div class="col-sm-4">
                    <h2 class="mb-0">Manage Brand</h2>
                </div>

                <!-- 2. Ang Buttons sa tuo nga mag-linya gyud -->
                <div class="col-sm-8 text-sm-end mt-2 mt-sm-0">
                    <div class="d-flex flex-wrap gap-1 justify-content-start justify-content-sm-end">
                        <a th:href="@{/brands/new}" class="btn btn-primary btn-sm">New Brand</a> <a
                            th:href="@{/categories/export/csv}" class="btn btn-secondary btn-sm">CSV</a> <a
                            th:href="@{/categories/export/pdf}" class="btn btn-danger btn-sm">PDF</a> <a
                            th:href="@{/categories/export/excel}" class="btn btn-success btn-sm">Excel</a>
                    </div>
                </div>
            </div>

            <!-- "The user has been saved successfully" -->
            <div th:if="${message != null}" class="alert alert-success text-center mt-3">[[${message}]]</div>
        </div>

        <!-- Table Section -->
        <div class="mt-3">
            <table id="brandTable"
                class="table table-bordered table-striped table-hover display responsive nowrap"
                style="width: 100%">
                <thead class="table-dark">
                    <tr>
                        <th>Brand ID</th>
                        <th>Logo</th>
                        <th>Brand Name</th>
                        <th>Categories</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="brand : ${listBrands}">
                        <td>[[${brand.id}]]</td>
                        <td>
                            <!-- Kon walay logo (null o empty), i-display ang default thumbnail --> <img
                            th:if="${brand.logo == null}" th:src="@{/images/image-thumbnail.png}"
                            style="width: 100px; height: 100px; object-fit: contain;" class="img-thumbnail" /> <!-- Kon naay logo, gamita ang iyang logoPath -->
                            <img th:if="${brand.logo != null}" th:src="@{${brand.logoPath}}"
                            style="width: 100px; height: 100px; object-fit: contain;" class="img-thumbnail" />
                        </td>

                        <td>[[${brand.name}]]</td>
                        <td>
                            <!-- I-loop ang categories isip badges --> 
                            <div style="display: flex; flex-wrap: wrap; gap: 3px; max-width: 250px;">
                            <th:block th:each="cat : ${brand.categories}">
                                <span class="badge bg-secondary text-white m-1" th:text="${cat.name}"></span>
                            </th:block>
                            </div>
                        </td>
                        <td>
                            <a class="fas fa-edit fa-2x text-success text-decoration-none" 
                                th:href="@{'/brands/edit/' + ${brand.id}}" title="Edit this Brand"></a>
                                &nbsp; 
                            <a class="fas fa-trash fa-2x text-secondary text-decoration-none link-delete" 
                                th:href="@{'/brands/delete/' + ${brand.id}}" th:entityId="${brand.id}" title="Delete this Brand"></a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div th:replace="~{fragments :: footer}"></div>
    </div>

    <!-- Modal Dialog for Delete -->
    <div th:replace="~{fragments :: confirm_modal}"></div>

    <!-- 4. Initialization Script -->
    <script type="text/javascript">
    $(document).ready(function() {
        // 1. DataTable Initialization
        $('#brandTable').DataTable({
			"ordering": false, // I-disable ang automatic sort
            "responsive": true,
            "columnDefs": [
            	{ "responsivePriority": 1, "targets": 2 }, // Brand Name (Pabilin sa screen)
                { "responsivePriority": 2, "targets": 4 }, // Actions (Pabilin sa screen)
                { "responsivePriority": 3, "targets": 0 }, // Brand ID
                
                // KANI ANG MAGIC:
                { 
                    "targets": 1, // Logo column
                    "className": "none" // Ang 'none' sa DataTables nagpasabot: "Itago sa main table, pero ipakita sa child row (+)"
                },
                
                { "responsivePriority": 11, "targets": 3 } // Categories
            ],
            "pageLength": 10,
            "stateSave": true,
            "language": {
                "search": "Search Brands:",
                "lengthMenu": "Show _MENU_ brands per page"
            }
        });

        // 2. Delete Confirmation (Event Delegation style)
        // Kani maseguro nga maski mag-search o mag-next page ka, mo-work gihapon ang Modal
        $(document).on("click", ".link-delete", function(e) {
            e.preventDefault();
            var link = $(this);
            var brandId = link.attr("entityId");
            
            $("#yesButton").attr("href", link.attr("href"));
            $("#confirmText").text("Are you sure you want to delete this Brand ID " + brandId + "?");
            $("#confirmModal").modal("show");
        });
    });
</script>
<script type="text/javascript" th:src="@{/js/script.js}"></script>
</body>
</html>
