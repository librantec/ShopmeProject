<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
</head>
<body>
<div th:fragment="menu">
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark rounded mt-1">
        <a class="navbar-brand ms-2" th:href="@{/}"> <img th:src="@{/images/ShopmeAdminSmall.png}" width="100" />
        </a>
        <button class="navbar-toggler me-2" type="button" data-bs-toggle="collapse" data-bs-target="#topNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="topNavbar">
            <ul class="navbar-nav px-3">
                <li class="nav-item" sec:authorize="hasAuthority('Admin')"><a class="nav-link" th:href="@{/users}">Users</a></li>
                
                <th:block sec:authorize="hasAnyAuthority('Admin', 'Editor')">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/categories}">Categories</a>
                </li>
                </th:block>
                
                <th:block sec:authorize="hasAnyAuthority('Admin', 'Editor')">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/brands}">Brands</a>
                </li>
                </th:block>
                
                <!-- PRODUCTS: Admin, Salesperson, Editor, Shipper -->
                <th:block sec:authorize="hasAnyAuthority('Admin', 'Salesperson', 'Editor', 'Shipper')">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/products}">Products</a>
                </li>
                </th:block>
                
                <!-- QUESTIONS: Admin, Assistant -->
                <!-- <th:block sec:authorize="hasAnyAuthority('Admin', 'Assistant')">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/questions}">Questions</a>
                    </li>
                </th:block> -->
                
                <!-- REVIEWS: Admin, Assistant -->
                <th:block sec:authorize="hasAnyAuthority('Admin', 'Assistant')">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/reviews}">Reviews</a>
                    </li>
                </th:block>
    
                <!-- CUSTOMERS: Admin, Salesperson -->
                <th:block sec:authorize="hasAnyAuthority('Admin', 'Salesperson')">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/customers}">Customers</a>
                    </li>
                </th:block>
                
                <!-- ORDERS: Admin, Salesperson, Shipper -->
                <th:block sec:authorize="hasAnyAuthority('Admin', 'Salesperson', 'Shipper')">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/orders}">Orders</a>
                    </li>
                </th:block>
                
                <!-- SHIPPING: Admin, Salesperson -->
                <th:block sec:authorize="hasAnyAuthority('Admin', 'Salesperson')">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/shipping}">Shipping</a>
                    </li>
                </th:block>
                
                <!-- REPORTS: Admin, Salesperson -->
                <th:block sec:authorize="hasAnyAuthority('Admin', 'Salesperson')">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/reports}">Sales Report</a>
                    </li>
                </th:block>
                
                <!-- ARTICLES: Admin, Editor -->
                <th:block sec:authorize="hasAnyAuthority('Admin', 'Editor')">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/articles}">Articles</a>
                    </li>
                </th:block>
                
                <!-- MENUS: Admin, Editor -->
                <th:block sec:authorize="hasAnyAuthority('Admin', 'Editor')">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/menus}">Menus</a>
                    </li>
                </th:block>
                
                <li class="nav-item" sec:authorize="hasAuthority('Admin')">
                    <a class="nav-link" th:href="@{/settings}">Settings</a>
                </li>
            </ul>

            <!-- USER DROPDOWN & LOGOUT -->
            <ul class="navbar-nav pe-3">
                <li class="nav-item dropdown"><a
                    class="nav-link dropdown-toggle font-weight-bold d-flex align-items-center" th:href="@{/account}"
                    id="userDropdown" role="button"> <span class="fas fa-user fa-2x icon-silver me-2"></span> 
                    <span sec:authentication="principal.fullname" class="ms-1">Username</span>
                </a>

                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                        <li>
                            <!-- Gihimo nato nga link ang logout para mas limpyo tan-awon --> 
                           <a class="dropdown-item" href="javascript:document.getElementById('logoutForm').submit();">Logout</a>
                            <form th:action="@{/logout}" method="post" id="logoutForm" style="display: none;"></form>
                        </li>
                    </ul></li>
            </ul>

        </div>
    </nav>
</div>
</body>
</html>
