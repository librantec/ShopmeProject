<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
	<title>Manage Users - Shopme Admin</title>
	
    <link rel="stylesheet" type="text/css" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" />
	<link rel="stylesheet" type="text/css" th:href="@{/webjars/font-awesome/css/all.min.css}" />
	<link rel="stylesheet" type="text/css" th:href="@{/css/style.css}" />
	<script type="text/javascript" th:src="@{/webjars/jquery/jquery.min.js}"></script>
	
	<!-- 1. LOCAL DATATABLES CSS (Dili na ma-block!) -->
	<link rel="stylesheet" type="text/css" th:href="@{/webjars/datatables/css/jquery.dataTables.min.css}" />
	<link rel="stylesheet" type="text/css" th:href="@{/webjars/datatables-responsive/css/responsive.dataTables.min.css}" />
	
	<!-- 2. LOCAL DATATABLES JS -->
	<script type="text/javascript" th:src="@{/webjars/datatables/js/jquery.dataTables.min.js}"></script>
	<script type="text/javascript" th:src="@{/webjars/datatables-responsive/js/dataTables.responsive.min.js}"></script>
	<!-- <script type="text/javascript" th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script> -->
	<script type="text/javascript" th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
	
</head>
<body>
	<div class="container-fluid px-3">
		<!-- Navigation Menu -->
		<div th:replace="~{navigation :: menu}"></div>

        <div class="mt-3 mb-3">
            <div class="row align-items-center">
                <!-- 1. Ang Title sa wala -->
                <div class="col-sm-4">
                    <h2 class="mb-0">Manage Users</h2>
                </div>

                <!-- 2. Ang Buttons sa tuo nga mag-linya gyud -->
                <div class="col-sm-8 text-sm-end mt-2 mt-sm-0">
                    <div class="d-flex flex-wrap gap-1 justify-content-start justify-content-sm-end">
                        <a th:href="@{/users/new}" class="btn btn-primary btn-sm">New User</a> <a
                            th:href="@{/users/export/csv}" class="btn btn-secondary btn-sm">CSV</a> <a
                            th:href="@{/users/export/pdf}" class="btn btn-danger btn-sm">PDF</a> <a
                            th:href="@{/users/export/excel}" class="btn btn-success btn-sm">Excel</a>
                    </div>
                </div>
            </div>

            <!-- "The user has been saved successfully" -->
            <div th:if="${message != null}" class="alert alert-success text-center mt-3">[[${message}]]</div>
        </div>

        <!-- Table Section -->
		<div class="mt-3">
			<table id="userTable"
				class="table table-bordered table-striped table-hover display responsive nowrap"
				style="width: 100%">
				<thead class="table-dark">
					<tr>
						<th>User ID</th>
						<th>Photos</th>
						<th>E-mail</th>
						<th>First Name</th>
						<th>Last Name</th>
						<th>Roles</th>
						<th>Enabled</th>
						<th>Actions</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="user : ${listUsers}">
						<td>[[${user.id}]]</td>
						<td>
							<span th:if="${user.photos == null or user.photos == ''}"
							class="fas fa-portrait fa-3x icon-silver img-thumbnail d-block mx-auto" style="width: 100px"></span> 
							<!-- <span th:if="${user.photos == null}" class="fas fa-portrait fa-3x icon-silver img-thumbnail d-block mx-auto" style="width: 50px"></span> --> 
							<!-- <img th:if="${user.photos != null}" th:src="@{${user.photosImagePath}}" style="width: 50px"
								class="img-thumbnail d-block mx-auto" /> -->
							<img th:if="${user.photos != null and user.photos != ''}"
							th:src="@{${user.photosImagePath}}" style="width: 100px"
							class="img-thumbnail d-block mx-auto" />
						</td>
						<td>[[${user.email}]]</td>
						<td>[[${user.firstName}]]</td>
						<td>[[${user.lastName}]]</td>
						<td>[[${user.roles}]]</td>
						<td>
							<a th:if="${user.enabled == true}" class="fas fa-check-circle fa-2x text-success text-decoration-none" 
								th:href="@{'/users/' + ${user.id} + '/enabled/false'}" title="Disable this user"></a> 
							<a th:if="${user.enabled == false}" class="fas fa-circle fa-2x text-secondary text-decoration-none" 
								th:href="@{'/users/' + ${user.id} + '/enabled/true'}" title="Enable this user"></a>
						</td>
						<td>
							<a class="fas fa-edit fa-2x text-success text-decoration-none" 
								th:href="@{'/users/edit/' + ${user.id}}" title="Edit this user"></a>
								&nbsp; 
							<a class="fas fa-trash fa-2x text-secondary text-decoration-none link-delete" 
								th:href="@{'/users/delete/' + ${user.id}}" th:userId="${user.id}" title="Delete this user"></a>
						</td>
					</tr>
				</tbody>
			</table>
		</div>

		<div th:replace="~{fragments :: footer}"></div>
	</div>

	<!-- Modal Dialog -->
	<div class="modal fade text-center" id="confirmModal">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header">
					<h4 class="modal-title">Delete Confirmation</h4>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				</div>

				<div class="modal-body">
					<span id="confirmText"></span>
				</div>

				<div class="modal-footer">
					<a class="btn btn-success" href="" id="yesButton">Yes</a>
					<button type="button" class="btn btn-danger"
						data-bs-dismiss="modal">No</button>
				</div>
			</div>
		</div>
	</div>

	<!-- 4. Initialization Script -->
	<script type="text/javascript">
    $(document).ready(function() {
        // 1. DataTable Initialization
        $('#userTable').DataTable({
            "responsive": true,
            "columnDefs": [
                { "responsivePriority": 1, "targets": 0 },
                { "responsivePriority": 2, "targets": 2 },
                { "responsivePriority": 3, "targets": -1 }
            ],
            "pageLength": 10,
            "stateSave": true,
            "language": {
                "search": "Search User:",
                "lengthMenu": "Show _MENU_ users per page"
            }
        });

        // 2. Delete Confirmation (Event Delegation style)
        // Kani maseguro nga maski mag-search o mag-next page ka, mo-work gihapon ang Modal
        $(document).on("click", ".link-delete", function(e) {
            e.preventDefault();
            var link = $(this);
            var userId = link.attr("userId");
            
            $("#yesButton").attr("href", link.attr("href"));
            $("#confirmText").text("Are you sure you want to delete this user ID " + userId + "?");
            $("#confirmModal").modal("show");
        });
    });
</script>
<script type="text/javascript" th:src="@{/js/script.js}"></script>
</body>
</html>
