<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Product Overview</title>
</head>
<body>
    <div th:fragment="content" th:remove="tag">
        <div class="form-group row mb-3">
            <label class="col-sm-2 col-form-label">Product Name:</label>
            <div class="col-sm-10">
                <input type="text" class="form-control" th:field="*{name}" required th:minlength="3" th:maxlength="256" />
            </div>
        </div>

        <!-- ALIAS FIELD -->
        <div class="form-group row mb-3">
            <label class="col-sm-2 col-form-label">Alias:</label>
            <div class="col-sm-10">
                <input type="text" class="form-control" th:field="*{alias}"
                    placeholder="Default is product name (all lowercase and spaces replaced by dashes)" th:minlength="3"
                    th:maxlength="256" />
            </div>
        </div>

        <!-- BRAND DROPDOWN -->
        <div class="form-group row mb-3">
            <label class="col-sm-2 col-form-label">Brand:</label>
            <div class="col-sm-10">
                <select th:field="*{brand}" class="form-select" required>
                    <!-- <option value="0">[Select Brand]</option> -->
                    <th:block th:each="brand : ${listBrands}">
                        <option th:value="${brand.id}">[[${brand.name}]]</option>
                    </th:block>
                </select>
            </div>
        </div>

        <!-- Category Dropdown -->
        <div class="form-group row mb-3">
            <label class="col-sm-2 col-form-label">Category:</label>
            <div class="col-sm-10">
                <select th:field="*{category}" class="form-select" required>
                    <!-- Blangko lang una ni, i-load via AJAX unya -->
                </select>
            </div>
        </div>

        <!-- Enabled Checkbox -->
        <div class="form-group row mb-3">
            <label class="col-sm-2 col-form-label">Enabled:</label>
            <div class="col-sm-10">
                <input type="checkbox" th:field="*{enabled}" class="m-2" />
            </div>
        </div>

        <!-- In Stock Checkbox -->
        <div class="form-group row mb-3">
            <label class="col-sm-2 col-form-label">In Stock:</label>
            <div class="col-sm-10">
                <input type="checkbox" th:field="*{inStock}" class="m-2" />
            </div>
        </div>
        
<!-- COST -->
<div class="form-group row mb-3">
    <label class="col-sm-2 col-form-label">Cost:</label>
    <div class="col-sm-10">
        <input type="number" step="0.01" class="form-control" th:field="*{cost}" required />
    </div>
</div>

<!-- LIST PRICE -->
<div class="form-group row mb-3">
    <label class="col-sm-2 col-form-label">List Price:</label>
    <div class="col-sm-10">
        <input type="number" step="0.01" class="form-control" th:field="*{price}" required />
    </div>
</div>

<!-- DISCOUNT -->
<div class="form-group row mb-3">
    <label class="col-sm-2 col-form-label">Discount:</label>
    <div class="col-sm-10">
        <input type="number" step="0.01" class="form-control" th:field="*{discountPercent}" required />
    </div>
</div>

    </div>
</body>
</html>
