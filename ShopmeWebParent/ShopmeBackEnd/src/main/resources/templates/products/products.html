<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <title>Manage Products - Shopme Admin</title>
    
    <link rel="stylesheet" type="text/css" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" />
    <link rel="stylesheet" type="text/css" th:href="@{/webjars/font-awesome/css/all.min.css}" />
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}" />
    <script type="text/javascript" th:src="@{/webjars/jquery/jquery.min.js}"></script>
    
    <!-- 1. LOCAL DATATABLES CSS (Dili na ma-block!) -->
    <link rel="stylesheet" type="text/css" th:href="@{/webjars/datatables/css/jquery.dataTables.min.css}" />
    <link rel="stylesheet" type="text/css" th:href="@{/webjars/datatables-responsive/css/responsive.dataTables.min.css}" />
    
    <!-- 2. LOCAL DATATABLES JS -->
    <script type="text/javascript" th:src="@{/webjars/datatables/js/jquery.dataTables.min.js}"></script>
    <script type="text/javascript" th:src="@{/webjars/datatables-responsive/js/dataTables.responsive.min.js}"></script>
    <!-- <script type="text/javascript" th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script> -->
    <script type="text/javascript" th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
    
</head>
<body>
    <div class="container-fluid px-3">
        <!-- Navigation Menu -->
        <div th:replace="~{navigation :: menu}"></div>

        <div class="mt-3 mb-3">
            <div class="row align-items-center">
                <!-- 1. Ang Title sa wala -->
                <div class="col-sm-4">
                    <h2 class="mb-0">Manage Products</h2>
                </div>

                <!-- 2. Ang Buttons sa tuo nga mag-linya gyud -->
                <div class="col-sm-8 text-sm-end mt-2 mt-sm-0">
                    <div class="d-flex flex-wrap gap-1 justify-content-start justify-content-sm-end">
                        <a th:href="@{/products/new}" class="btn btn-primary btn-sm">New Products</a> <a
                            th:href="@{/products/export/csv}" class="btn btn-secondary btn-sm">CSV</a> <a
                            th:href="@{/products/export/pdf}" class="btn btn-danger btn-sm">PDF</a> <a
                            th:href="@{/products/export/excel}" class="btn btn-success btn-sm">Excel</a>
                    </div>
                </div>
            </div>

            <!-- "The product has been saved successfully" -->
            <div th:if="${message != null}" class="alert alert-success text-center mt-3">[[${message}]]</div>
        </div>

        <!-- Table Section -->
        <div class="mt-3">
            <table id="productTable"
                class="table table-bordered table-striped table-hover display responsive nowrap"
                style="width: 100%">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Main Image</th>
                        <th>Product Name</th>
                        <th>Brand</th>
                        <th>Category</th>
                        <th>Enabled</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="product : ${listProducts}">
                        <td>[[${product.id}]]</td>
						<td>
                            <img th:src="@{${product.mainImagePath}}" style="width: 120px; height: 120px; object-fit: contain;" class="img-fluid" /> 
                        </td>
                        
                        <td>[[${product.name}]]</td>
                        <td>[[${product.brand.name}]]</td>
                        <td>[[${product.category.name}]]</td>
                        <td>
                            <a th:if="${product.enabled == true}" class="fas fa-check-circle fa-2x text-success text-decoration-none" 
                                th:href="@{'/products/' + ${product.id} + '/enabled/false'}" title="Disable this product"></a> 
                            <a th:if="${product.enabled == false}" class="fas fa-circle fa-2x text-secondary text-decoration-none" 
                                th:href="@{'/products/' + ${product.id} + '/enabled/true'}" title="Enable this product"></a>
                        </td>
                        <td>
                            <!-- Kani ang para sa Details -->
                            <a class="fas fa-file-alt fa-2x text-primary text-decoration-none link-detail"
                                th:href="@{'/products/detail/' + ${product.id}}" title="View details of this product"></a>
                                &nbsp;
                                
                            <a class="fas fa-edit fa-2x text-success text-decoration-none" 
                                th:href="@{'/products/edit/' + ${product.id}}" title="Edit this Product"></a>
                                &nbsp;
                                 
                            <a class="fas fa-trash fa-2x text-secondary text-decoration-none link-delete" 
                                th:href="@{'/products/delete/' + ${product.id}}" th:data-id="${product.id}" title="Delete this Product"></a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div th:replace="~{fragments :: footer}"></div>
    </div>

    <!-- Modal Dialog for Delete -->
    <div th:replace="~{fragments :: confirm_modal}"></div>

    <!-- 4. Initialization Script -->
    <script type="text/javascript">
    $(document).ready(function() {
        // 1. DataTable Initialization
        $('#productTable').DataTable({
			"ordering": false, // I-disable ang automatic sort
            "responsive": true,
            "columnDefs": [
                { "responsivePriority": 1, "targets": 0 },
                { "responsivePriority": 2, "targets": 2 },
                { "responsivePriority": 3, "targets": -1 }
            ],
            "pageLength": 10,
            "stateSave": true,
            "language": {
                "search": "Search Products:",
                "lengthMenu": "Show _MENU_ products per page"
            }
        });

        // 2. Delete Confirmation (Event Delegation style)
        // Kani maseguro nga maski mag-search o mag-next page ka, mo-work gihapon ang Modal
        $(document).on("click", ".link-delete", function(e) {
            e.preventDefault();
            var link = $(this);
            var productId = link.data("id");
            
            $("#yesButton").attr("href", link.attr("href"));
            $("#confirmText").text("Are you sure you want to delete this Product ID " + productId + "?");
            $("#confirmModal").modal("show");
        });
    });
</script>
<script type="text/javascript" th:src="@{/js/script.js}"></script>
</body>
</html>
