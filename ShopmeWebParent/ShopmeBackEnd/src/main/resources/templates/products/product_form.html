<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
	<title>[[${pageTitle}]]</title>
	
	<link rel="stylesheet" type="text/css" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" />
	<link rel="stylesheet" type="text/css" th:href="@{/webjars/font-awesome/css/all.min.css}" />
    <link rel="stylesheet" type="text/css" th:href="@{/richtext/richtext.min.css}" />
	
    <script type="text/javascript" th:src="@{/webjars/jquery/jquery.min.js}"></script>
	<script type="text/javascript" th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
    <script type="text/javascript" th:src="@{/richtext/jquery.richtext.min.js}"></script>
</head>
<body>
	<div class="container-fluid px-3">
		<!-- Navigation Menu -->
		<div th:replace="~{navigation :: menu}"></div>

		<div class="mt-3 mb-3">
			<h2>Manage Products | [[${pageTitle}]]</h2>
		</div>

		<!-- Form Section -->
        <div class="card shadow-sm mx-auto w-100">
            <div class="card-body p-4">
                <form th:action="@{/products/save}" method="post" onsubmit="return checkUniqueProduct(this)" th:object="${product}" enctype="multipart/form-data">
                    <input type="hidden" th:field="*{id}" />

                    <!-- 1. Ang Tab Headers -->
                    <ul class="nav nav-tabs" id="myTab" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="overview-tab" data-bs-toggle="tab"
                                data-bs-target="#overview" type="button" role="tab">Overview</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="description-tab" data-bs-toggle="tab"
                                data-bs-target="#description" type="button" role="tab">Description</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="images-tab" data-bs-toggle="tab" data-bs-target="#images"
                                type="button" role="tab">Images</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="details-tab" data-bs-toggle="tab" data-bs-target="#details"
                                type="button" role="tab">Details</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="shipping-tab" data-bs-toggle="tab" data-bs-target="#shipping"
                                type="button" role="tab">Shipping</button>
                        </li>
                    </ul>

                    <!-- 2. Ang Tab Contents -->
                    <div class="tab-content" id="myTabContent">
                        <div class="tab-pane fade show active p-3" id="overview" role="tabpanel">
                            <!-- Diri ibutang ang Brand, Name, ug uban pa -->
                            <div th:replace="~{products/product_overview :: content}"></div>
                        </div>
                        <div class="tab-pane fade p-3" id="description" role="tabpanel">
                            <div th:replace="~{products/product_description :: content}"></div>
                        </div>
                        <div class="tab-pane fade p-3" id="images" role="tabpanel">
                            <h3>Images Contents</h3>
                        </div>
                        <div class="tab-pane fade p-3" id="details" role="tabpanel">
                            <h3>Details Contents</h3>
                        </div>
                        <div class="tab-pane fade p-3" id="shipping" role="tabpanel">
                            <div th:replace="~{products/product_shipping :: content}"></div>
                        </div>
                    </div>

                    <div class="text-center">
                        <input type="submit" value="Save" class="btn btn-primary m-3" /> <input type="button"
                            value="Cancel" class="btn btn-secondary" id="buttonCancel" />
                    </div>
                </form>

                <div th:replace="~{fragments :: modal_dialog}"></div>
            </div>
        </div>

        <div th:replace="~{fragments :: footer}"></div>
	</div>

<script type="text/javascript">
	$(document).ready(function() {
		$("#buttonCancel").on("click", function() {
			window.location = "[[@{/products}]]";
		});

		// I-check kung naa message gikan sa RedirectAttributes
		var message = "[[${message}]]";
		if (message != "") {
			showModalDialog("Error", message);
		}
	});

	// Mao ni ang variable nga gamiton sa imong external script.js
	// Global variables para sa script.js
	var moduleURL = "[[@{/products}]]";
	var brandModuleURL = "[[@{/brands}]]";
	var checkUniqueUrl = "[[@{/products/check_unique}]]"; // Idugang ni para kaila ang script.js
</script>
<script type="text/javascript" th:src="@{/js/script.js}"></script>
</body>
</html>
