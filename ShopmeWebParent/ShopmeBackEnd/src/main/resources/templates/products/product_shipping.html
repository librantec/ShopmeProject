<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Product Shipping</title>
</head>
<body>
    <div th:fragment="content" th:remove="tag">
        <div class="m-3">
            <p class="text-muted mb-4">
            The following information is important to calculate shipping cost for the product.<br>
            The dimensions (L X W X H) is for the box that is used to package the product - not the product's dimensions.
            </p>

            <div class="form-group row mb-3">
                <label class="col-sm-2 col-form-label">Length (inch):</label>
                <div class="col-sm-10">
                    <input type="number" step="0.01" th:field="*{length}" class="form-control" required />
                </div>
            </div>

            <div class="form-group row mb-3">
                <label class="col-sm-2 col-form-label">Width (inch):</label>
                <div class="col-sm-10">
                    <input type="number" step="0.01" th:field="*{width}" class="form-control" required />
                </div>
            </div>

            <div class="form-group row mb-3">
                <label class="col-sm-2 col-form-label">Height (inch):</label>
                <div class="col-sm-10">
                    <input type="number" step="0.01" th:field="*{height}" class="form-control" required />
                </div>
            </div>

            <div class="form-group row mb-3">
                <label class="col-sm-2 col-form-label">Weight (pounds):</label>
                <div class="col-sm-10">
                    <input type="number" step="0.01" th:field="*{weight}" class="form-control" required />
                </div>
            </div>
        </div>
    </div>
</body>
</html>
